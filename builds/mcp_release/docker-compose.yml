services:
  mcp-memory:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SERVER_KIND: memory
      HOST: 0.0.0.0
      PORT: 8911
      MEMORY_ROOT: /data/memory
    ports:
      - "8911:8911"
    volumes:
      - mcp_release_memory:/data/memory

  mcp-auth:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SERVER_KIND: auth
      HOST: 0.0.0.0
      PORT: 8912
      MEMORY_ROOT: /data/memory
    ports:
      - "8912:8912"
    volumes:
      - mcp_release_memory:/data/memory

  mcp-project:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SERVER_KIND: project
      HOST: 0.0.0.0
      PORT: 8913
      MEMORY_ROOT: /data/memory
    ports:
      - "8913:8913"
    volumes:
      - mcp_release_memory:/data/memory

volumes:
  mcp_release_memory:
