name: braindrive

services:
  app:
    image: ${BRAINDRIVE_APP_REF:-${BRAINDRIVE_APP_IMAGE:-ghcr.io/braindrive-ai/braindrive-app}:${BRAINDRIVE_TAG:-latest}}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      BRAINDRIVE_INSTALL_MODE: prod
      HOST: 0.0.0.0
      PORT: 8787
      MCP_SERVERS_FILE: mcp/servers.full-mcp.json
      PAA_MEMORY_ROOT: /data/memory
      PAA_SECRETS_HOME: /run/paa-secrets
      PAA_SECRETS_MASTER_KEY_B64: ${PAA_SECRETS_MASTER_KEY_B64}
      PAA_SECRETS_MASTER_KEY_ID: ${PAA_SECRETS_MASTER_KEY_ID:-owner-master-v1}
      PAA_AUTH_BOOTSTRAP_TOKEN: ${PAA_AUTH_BOOTSTRAP_TOKEN:-}
      PAA_AUTH_ALLOW_FIRST_SIGNUP_ANY_IP: ${PAA_AUTH_ALLOW_FIRST_SIGNUP_ANY_IP:-true}
      TZ: ${TZ:-UTC}
    volumes:
      - braindrive_memory:/data/memory
      - braindrive_secrets:/run/paa-secrets
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 20s
    security_opt:
      - no-new-privileges:true

  edge:
    image: ${BRAINDRIVE_EDGE_REF:-${BRAINDRIVE_EDGE_IMAGE:-ghcr.io/braindrive-ai/braindrive-edge}:${BRAINDRIVE_TAG:-latest}}
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    security_opt:
      - no-new-privileges:true

volumes:
  braindrive_memory:
    name: braindrive_memory
  braindrive_secrets:
    name: braindrive_secrets
  caddy_data:
    name: braindrive_caddy_data
  caddy_config:
    name: braindrive_caddy_config
